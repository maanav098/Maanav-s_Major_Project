services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    privileged: true
    restart: unless-stopped
    tmpfs:
      - /piston/jobs
    volumes:
      - piston-packages:/piston/packages
    networks:
      - app-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      - piston
    env_file:
      - ./backend/.env
    environment:
      PISTON_URL: http://piston:2000
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/storage/interview_platform.db}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./backend/interview_platform.db:/app/storage/interview_platform.db
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - app-net

volumes:
  piston-packages:

networks:
  app-net:
    driver: bridge
